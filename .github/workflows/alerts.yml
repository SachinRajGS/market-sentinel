name: Market Sentinel Alerts

on:
  schedule:
    - cron: "*/15 * * * *"   # every ~15 min (GitHub may delay a few minutes)
  workflow_dispatch:          # manual "Run workflow" button for testing

permissions:
  contents: write             # to commit the alert-state file (dedupe)

concurrency:
  group: alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run alert engine
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python alert_engine.py

      - name: Persist alert state (dedupe)
        run: |
          git config user.name "market-sentinel-bot"
          git config user.email "actions@github.com"
          git add state/alert_state.json
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push || true
